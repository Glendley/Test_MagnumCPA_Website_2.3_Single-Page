<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Magnum CPA PC</title>
<style>
  :root{--navy:#243a52;--navy-dark:#1c2e41;--navy-3:#13212f;--gold:#f4a93c;--green:#7fae3a;--blue:#2f9fd6;--muted:#6b7785;--border:#dfe4ea;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;color:#2b2b2b;line-height:1.6;
    background:linear-gradient(135deg,#0c1320 0%,var(--navy-3) 55%,#22384f 100%);}
  a{text-decoration:none;color:inherit;}
  .globe{width:46px;height:46px;display:block;flex:none;}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:34px 18px;}
  .card{width:100%;max-width:400px;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;}
  .card-head{background:var(--navy);color:#fff;padding:28px 30px 24px;text-align:center;}
  .brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:14px;}
  .brand b{font-size:1.2rem;color:var(--green);font-weight:700;}
  .brand b span{color:#fff;}
  .brand small{display:block;font-size:.62rem;letter-spacing:1px;color:#aebccb;text-align:left;}
  .badge{display:inline-block;background:var(--gold);color:var(--navy-dark);font-weight:800;font-size:.72rem;
    letter-spacing:1.5px;padding:4px 12px;border-radius:20px;text-transform:uppercase;margin-bottom:10px;}
  .card-head h1{font-size:1.3rem;}
  .card-head p{color:#bccadb;font-size:.88rem;}
  .body{padding:28px 30px 30px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:1rem;}
  .field input:focus{outline:2px solid var(--gold);border-color:transparent;}
  .btn{width:100%;background:var(--navy);color:#fff;font-weight:800;padding:13px;border:0;border-radius:8px;
    font-size:1rem;cursor:pointer;letter-spacing:.3px;transition:transform .15s,box-shadow .2s;margin-top:4px;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(36,58,82,.4);}
  .secure{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:.78rem;margin-top:14px;}
  .back{display:block;text-align:center;color:#9fb0c4;font-size:.85rem;padding:18px 0 26px;}
  .back:hover{color:#fff;}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="globeIcon" viewBox="0 0 100 100">
    <defs><radialGradient id="gOcean" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#dcf0fb"/><stop offset="58%" stop-color="#a9d6f2"/><stop offset="100%" stop-color="#6db4e0"/>
    </radialGradient><clipPath id="gClip"><circle cx="50" cy="50" r="47"/></clipPath></defs>
    <circle cx="50" cy="50" r="47" fill="url(#gOcean)"/>
    <g clip-path="url(#gClip)" fill="none" stroke="#ffffff" stroke-width="0.8" opacity=".35">
      <line x1="3" y1="32" x2="97" y2="32"/><line x1="3" y1="50" x2="97" y2="50"/><line x1="3" y1="68" x2="97" y2="68"/>
      <line x1="50" y1="3" x2="50" y2="97"/><ellipse cx="50" cy="50" rx="20" ry="47"/><ellipse cx="50" cy="50" rx="37" ry="47"/>
    </g>
    <g clip-path="url(#gClip)">
      <path d="M28 18 C34 16 44 17 52 20 C60 22 70 24 74 30 C76 34 72 38 70 42 C72 46 70 52 64 56 C62 60 60 60 58 64 C57 68 55 66 54 62 C52 60 50 60 47 64 C44 70 42 78 38 82 C36 84 34 82 35 76 C36 70 34 64 32 58 C30 52 26 48 24 42 C22 36 22 28 25 22 C26 20 27 19 28 18 Z" fill="#5b9a3a" stroke="#467a2c" stroke-width="1"/>
      <path d="M32 58 C30 52 26 48 24 42 C22 36 22 28 25 22" fill="none" stroke="#f4a93c" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24.5" cy="43" r="3.6" fill="#e8442b" stroke="#fff" stroke-width="1.3"/>
    </g>
    <circle cx="50" cy="50" r="47" fill="none" stroke="#2f6d96" stroke-width="2"/>
  </symbol>
</svg>

<div class="wrap">
  <div>
    <div class="card">
      <div class="card-head">
        <div class="brand">
          <img src="images/MAGNUM%20CPA%20LOGO.png" alt="Magnum CPA PC" style="height:40px;width:auto;display:block;margin:0 auto;">
        </div>
        <div class="badge">Staff Access</div>
        <h1>Admin Login</h1>
        <p>Authorized personnel only.</p>
      </div>
      <div class="body">
        <form onsubmit="return adminLogin(event)">
          <div class="field"><label for="user">Admin Email / Username</label><input type="text" id="user" placeholder="admin@magnumcpa.com" required></div>
          <div class="field"><label for="pass">Password</label><input type="password" id="pass" placeholder="••••••••" required></div>
          <button class="btn" type="submit">Log In to Admin</button>
        </form>
        <div class="secure">🔒 Secured staff portal</div>
      </div>
    </div>
    <a class="back" href="index.html">← Back to magnumcpa.com</a>
  </div>
</div>

<script>
  // ===== Admin credentials — CHANGE THESE before going live =====
  const ADMIN_USER = "admin@magnumcpa.com";
  const ADMIN_PASS = "magnum2026";
  // ==============================================================

  function adminLogin(e){
    e.preventDefault();
    const u = document.getElementById('user').value.trim().toLowerCase();
    const p = document.getElementById('pass').value;
    if (u === ADMIN_USER.toLowerCase() && p === ADMIN_PASS){
      sessionStorage.setItem('magnum_admin', '1');
      window.location.href = 'admin.html';
    } else {
      alert('Invalid admin credentials.');
    }
    return false;
  }
</script>
</body>
</html>
