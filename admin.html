<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Magnum CPA PC</title>
<style>
  :root{
    --navy:#243a52;--navy-dark:#1c2e41;--navy-3:#13212f;
    --gold:#f4a93c;--green:#7fae3a;--blue:#2f9fd6;
    --text:#2b2b2b;--muted:#6b7785;--border:#e1e6ec;--bg-alt:#f3f5f8;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);background:var(--bg-alt);line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{text-decoration:none;color:inherit;}
  .container{max-width:1100px;margin:0 auto;padding:0 20px;}
  .globe{width:40px;height:40px;display:block;flex:none;}

  header{background:var(--navy-3);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.3);}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand b{font-size:1.1rem;color:var(--green);font-weight:700;}
  .brand b span{color:#fff;}
  .brand small{display:block;font-size:.6rem;letter-spacing:1px;color:var(--gold);}
  .hright{display:flex;align-items:center;gap:14px;font-size:.9rem;}
  .btn{background:var(--gold);color:var(--navy-dark);font-weight:700;padding:9px 16px;border-radius:6px;cursor:pointer;border:0;font-size:.85rem;transition:.2s;}
  .btn:hover{filter:brightness(1.05);}
  .btn.ghost{background:transparent;color:#cdd6df;border:1px solid #3a4d66;}
  .btn.ghost:hover{background:#1c2e41;color:#fff;}

  section{padding:28px 0;}
  /* stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:8px;}
  .stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;border-top:4px solid var(--gold);}
  .stat b{display:block;font-size:1.9rem;color:var(--navy);font-weight:800;}
  .stat span{color:var(--muted);font-size:.85rem;}

  .bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:26px 0 14px;flex-wrap:wrap;}
  .bar h2{color:var(--navy);font-size:1.3rem;}
  .search{padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;min-width:240px;}

  .client{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:0 6px 18px rgba(36,58,82,.05);}
  .client-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;}
  .client-head:hover{background:#fafbfc;}
  .ava{width:48px;height:48px;border-radius:50%;background:var(--navy);color:var(--gold);display:grid;place-items:center;font-weight:700;flex:none;overflow:hidden;}
  .ava img{width:100%;height:100%;object-fit:cover;}
  .client-head .who{flex:1;min-width:0;}
  .client-head .who b{color:var(--navy);display:block;}
  .client-head .who span{color:var(--muted);font-size:.85rem;}
  .pill{background:var(--bg-alt);border:1px solid var(--border);color:var(--muted);font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .pill.docs{background:#eef6e6;border-color:#cfe3bd;color:#4f7d2f;}
  .chev{color:var(--muted);transition:transform .2s;}
  .client.open .chev{transform:rotate(90deg);}

  .client-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border);}
  .client.open .client-body{display:block;}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 24px;padding:16px 0;}
  .info-grid .it{font-size:.9rem;}
  .info-grid .it label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;}
  .info-grid .it span{color:#2b2b2b;}
  .docs-h{font-size:.85rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 10px;}
  .admin-cols{display:grid;grid-template-columns:360px 1fr;gap:26px;align-items:start;}
  .clients-more{color:var(--muted);font-size:.85rem;margin-top:6px;text-align:center;}
  @media(max-width:980px){.admin-cols{grid-template-columns:1fr;}}
  .notif-wrap{position:relative;}
  .notif-btn{background:transparent;border:1px solid #3a4d66;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;position:relative;}
  .notif-dot{position:absolute;top:5px;right:5px;width:11px;height:11px;background:#e8442b;border-radius:50%;border:2px solid var(--navy-3);}
  .notif-panel{position:absolute;right:0;top:50px;width:340px;max-width:88vw;background:#fff;border-radius:12px;box-shadow:0 18px 44px rgba(0,0,0,.4);display:none;z-index:90;overflow:hidden;}
  .notif-panel.open{display:block;}
  .notif-head{background:var(--navy);color:#fff;padding:12px 16px;font-weight:700;font-size:.95rem;}
  .notif-panel .ni{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.88rem;color:#3c4757;}
  .notif-panel .ni.unread{background:#fff8ec;}
  .notif-panel .ni .nd{display:block;font-size:.72rem;color:var(--muted);margin-top:3px;}
  .notif-panel .ni a{color:var(--blue);font-weight:700;}
  .notif-empty{padding:16px;color:var(--muted);font-style:italic;font-size:.9rem;}
  .client-link{display:flex;align-items:center;gap:14px;padding:14px 18px;background:#fff;border:1px solid var(--border);
    border-radius:10px;margin-bottom:10px;box-shadow:0 4px 14px rgba(36,58,82,.05);transition:.15s;}
  .client-link:hover{transform:translateX(3px);box-shadow:0 8px 22px rgba(36,58,82,.12);border-color:var(--gold);}
  .client-link .who{flex:1;min-width:0;}
  .client-link .who b{color:var(--navy);display:block;}
  .client-link .who span{color:var(--muted);font-size:.85rem;}
  .client-link .chev{color:var(--gold);font-size:1.4rem;font-weight:700;}
  .org-sec{margin-bottom:12px;}
  .org-sec h5{color:var(--blue);font-size:.8rem;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 6px;}
  .doc-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
  .doc-row .fic{width:36px;height:36px;border-radius:7px;background:var(--navy);color:var(--gold);display:grid;place-items:center;flex:none;}
  .doc-row .m{flex:1;min-width:0;}
  .doc-row .m b{font-size:.9rem;color:var(--navy);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .doc-row .m span{font-size:.76rem;color:var(--muted);}
  .doc-row a{color:var(--blue);font-weight:700;font-size:.82rem;}
  .empty{color:var(--muted);font-style:italic;font-size:.9rem;padding:4px 0;}

  /* feedback */
  .fb-item{border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .fb-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .fb-ava{width:40px;height:40px;border-radius:50%;background:var(--navy);color:var(--gold);display:grid;place-items:center;font-weight:700;flex:none;overflow:hidden;}
  .fb-ava img{width:100%;height:100%;object-fit:cover;}
  .fb-name{font-weight:700;color:var(--navy);}
  .fb-date{font-size:.78rem;color:var(--muted);}
  .fb-stars{color:var(--gold);margin-left:auto;letter-spacing:1px;}
  .fb-text{color:#3c4757;font-size:.95rem;}

  /* admin chat threads */
  .thread{max-height:300px;overflow-y:auto;padding:14px 0;display:flex;flex-direction:column;}
  .bubble{max-width:75%;padding:8px 12px;border-radius:13px;font-size:.88rem;line-height:1.4;margin-bottom:8px;word-wrap:break-word;}
  .bubble.them{background:#eef1f5;color:#2b2b2b;align-self:flex-start;border-bottom-left-radius:4px;}
  .bubble.me{background:var(--gold);color:var(--navy-dark);align-self:flex-end;border-bottom-right-radius:4px;}
  .bubble .bt{display:block;font-size:.65rem;opacity:.65;margin-top:3px;}
  .reply{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);}
  .reply input{flex:1;padding:10px 13px;border:1px solid var(--border);border-radius:22px;font-size:.9rem;}
  .reply input:focus{outline:2px solid var(--gold);border-color:transparent;}

  /* admin chat panel (two-pane) */
  .chatbox{display:grid;grid-template-columns:310px 1fr;background:#fff;border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;box-shadow:0 6px 18px rgba(36,58,82,.05);min-height:440px;}
  .conv-list{border-right:1px solid var(--border);background:#fafbfc;max-height:520px;overflow-y:auto;}
  .conv-item{display:flex;gap:12px;align-items:center;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s;}
  .conv-item:hover{background:#f1f4f7;}
  .conv-item.active{background:#fff;box-shadow:inset 3px 0 0 var(--gold);}
  .conv-item .ava{width:42px;height:42px;font-size:.95rem;}
  .conv-item .ci{flex:1;min-width:0;}
  .conv-item .ci b{color:var(--navy);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .conv-item .ci span{font-size:.8rem;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .conv-item .badge{background:var(--gold);color:var(--navy-dark);font-size:.7rem;font-weight:800;border-radius:20px;padding:2px 8px;flex:none;}

  .conv-view{display:flex;flex-direction:column;min-width:0;}
  .cv-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .cv-head .ava{width:40px;height:40px;}
  .cv-head b{color:var(--navy);display:block;}
  .cv-head span{font-size:.82rem;color:var(--muted);}
  .cv-thread{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;background:#f3f5f8;min-height:280px;max-height:420px;}
  .cv-reply{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:#fff;}
  .cv-reply input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:22px;font-size:.92rem;}
  .cv-reply input:focus{outline:2px solid var(--gold);border-color:transparent;}
  .cv-reply button{width:44px;height:44px;border-radius:50%;border:0;background:var(--gold);color:var(--navy-dark);font-size:1.05rem;cursor:pointer;flex:none;}
  .cv-empty{margin:auto;color:var(--muted);font-style:italic;text-align:center;padding:30px;}

  @media (max-width:680px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .info-grid{grid-template-columns:1fr;}
    .chatbox{grid-template-columns:1fr;}
    .conv-list{max-height:220px;}
    .brand small{display:none;}
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="globeIcon" viewBox="0 0 100 100">
    <defs><radialGradient id="gOcean" cx="40%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#dcf0fb"/><stop offset="58%" stop-color="#a9d6f2"/><stop offset="100%" stop-color="#6db4e0"/>
    </radialGradient><clipPath id="gClip"><circle cx="50" cy="50" r="47"/></clipPath></defs>
    <circle cx="50" cy="50" r="47" fill="url(#gOcean)"/>
    <g clip-path="url(#gClip)" fill="none" stroke="#ffffff" stroke-width="0.8" opacity=".35">
      <line x1="3" y1="32" x2="97" y2="32"/><line x1="3" y1="50" x2="97" y2="50"/><line x1="3" y1="68" x2="97" y2="68"/>
      <line x1="50" y1="3" x2="50" y2="97"/><ellipse cx="50" cy="50" rx="20" ry="47"/><ellipse cx="50" cy="50" rx="37" ry="47"/>
    </g>
    <g clip-path="url(#gClip)">
      <path d="M28 18 C34 16 44 17 52 20 C60 22 70 24 74 30 C76 34 72 38 70 42 C72 46 70 52 64 56 C62 60 60 60 58 64 C57 68 55 66 54 62 C52 60 50 60 47 64 C44 70 42 78 38 82 C36 84 34 82 35 76 C36 70 34 64 32 58 C30 52 26 48 24 42 C22 36 22 28 25 22 C26 20 27 19 28 18 Z" fill="#5b9a3a" stroke="#467a2c" stroke-width="1"/>
      <path d="M32 58 C30 52 26 48 24 42 C22 36 22 28 25 22" fill="none" stroke="#f4a93c" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24.5" cy="43" r="3.6" fill="#e8442b" stroke="#fff" stroke-width="1.3"/>
    </g>
    <circle cx="50" cy="50" r="47" fill="none" stroke="#2f6d96" stroke-width="2"/>
  </symbol>
</svg>

<header>
  <div class="container hbar">
    <a class="brand" href="index.html">
      <img src="images/MAGNUM%20CPA%20LOGO.png" alt="Magnum CPA PC" style="height:42px;width:auto;display:block;">
    </a>
    <div class="hright">
      <div class="notif-wrap">
        <button class="notif-btn" id="notifBtn" onclick="toggleNotif()" aria-label="Notifications">🔔<span class="notif-dot" id="notifDot" style="display:none;"></span></button>
        <div class="notif-panel" id="notifPanel"><div class="notif-head">Notifications</div><div id="notifList"></div></div>
      </div>
      <button class="btn" onclick="exportExcel()">⬇ Export Excel</button>
      <button class="btn ghost" onclick="adminLogout()">Log Out</button>
    </div>
  </div>
</header>

<section>
  <div class="container">
    <div class="stats">
      <div class="stat"><b id="stClients">0</b><span>Total Clients</span></div>
      <div class="stat"><b id="stDocs">0</b><span>Uploaded Documents</span></div>
      <div class="stat"><b id="stFeedback">0</b><span>Feedback Reviews</span></div>
      <div class="stat"><b id="stRating">—</b><span>Avg. Rating</span></div>
    </div>

    <div class="admin-cols">
      <div>
        <div class="bar"><h2>Clients</h2></div>
        <input class="search" id="search" type="text" placeholder="Search name or email..." oninput="renderClients()" style="width:100%;margin-bottom:14px;">
        <div id="clientList"></div>
      </div>
      <div>
        <div class="bar"><h2>Client Messages</h2></div>
        <div class="chatbox">
          <div class="conv-list" id="convList"></div>
          <div class="conv-view" id="convView">
            <div class="cv-empty">Select a conversation on the left to read and reply.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bar"><h2>Client Feedback</h2></div>
    <div id="fbList"></div>
  </div>
</section>

<script src="organizer.js"></script>
<script>
  // ----- guard -----
  if (sessionStorage.getItem('magnum_admin') !== '1'){ window.location.href = 'admin-login.html'; }

  function adminLogout(){ sessionStorage.removeItem('magnum_admin'); window.location.href = 'admin-login.html'; }

  // ----- data access -----
  function getSignups(){ try{return JSON.parse(localStorage.getItem('magnum_signups')||'[]');}catch(e){return [];} }
  function getFeedback(){ try{return JSON.parse(localStorage.getItem('magnum_feedback')||'[]');}catch(e){return [];} }
  function profileFor(email){
    try{ return JSON.parse(localStorage.getItem('magnum_profile_'+(email||'').toLowerCase())||'{}'); }
    catch(e){ return {}; }
  }
  function organizerFor(email){
    try{ return JSON.parse(localStorage.getItem('magnum_organizer_'+(email||'').toLowerCase())||'{}'); }
    catch(e){ return {}; }
  }
  function orgSummary(email){
    const data = organizerFor(email);
    if (!data || !Object.keys(data).length) return '<p class="empty">Organizer not started.</p>';
    let html = '';
    ORGANIZER_SECTIONS.forEach(function(sec){
      const rows = sec.fields.filter(function(f){
        if (f.type === 'display') return false;
        const v = data[f.id];
        return v && (typeof v === 'string' ? v.trim() !== '' : true);
      }).map(function(f){
        const v = data[f.id];
        if (f.type === 'file' && v && v.name)
          return '<div class="it"><label>'+esc(f.label)+'</label><span><a href="'+v.data+'" download="'+esc(v.name)+'">📎 '+esc(v.name)+'</a></span></div>';
        return '<div class="it"><label>'+esc(f.label)+'</label><span>'+esc(v)+'</span></div>';
      });
      if (rows.length) html += '<div class="org-sec"><h5>'+esc(sec.title)+'</h5><div class="info-grid">'+rows.join('')+'</div></div>';
    });
    return html || '<p class="empty">Organizer not started.</p>';
  }
  function docsFor(email){
    try{ return JSON.parse(localStorage.getItem('magnum_docs_'+(email||'').toLowerCase())||'[]'); }
    catch(e){ return []; }
  }

  // merge signups + profiles into one client list keyed by email
  function getClients(){
    const map = {};
    getSignups().forEach(s => {
      const k = (s.email||'').toLowerCase();
      map[k] = { email: s.email, name: s.name, signupDate: s.date };
    });
    for (let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      if (key && key.indexOf('magnum_profile_')===0){
        const email = key.slice('magnum_profile_'.length);
        if (!map[email]) map[email] = { email: email, name: '' };
      }
    }
    return Object.keys(map).map(k => {
      const base = map[k];
      const p = profileFor(base.email);
      const docs = docsFor(base.email);
      return Object.assign(base, { profile: p, docs: docs, name: p.name || base.name || '(no name)' });
    });
  }

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function initial(n){ return (n||'?').trim().charAt(0).toUpperCase() || '?'; }
  function fmtSize(b){ if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
  function fileIcon(t,n){ n=(n||'').toLowerCase(); if((t||'').indexOf('image')===0)return '🖼️'; if(n.endsWith('.pdf'))return '📕'; if(n.endsWith('.doc')||n.endsWith('.docx'))return '📘'; if(n.endsWith('.xls')||n.endsWith('.xlsx'))return '📗'; return '📄'; }
  function starString(n){ n=+n||0; return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n); }

  // ----- render -----
  function renderStats(clients){
    const fb = getFeedback();
    const totalDocs = clients.reduce((a,c)=>a+c.docs.length,0);
    document.getElementById('stClients').textContent = clients.length;
    document.getElementById('stDocs').textContent = totalDocs;
    document.getElementById('stFeedback').textContent = fb.length;
    const avg = fb.length ? (fb.reduce((a,f)=>a+(+f.rating||0),0)/fb.length) : 0;
    document.getElementById('stRating').textContent = fb.length ? avg.toFixed(1)+' ★' : '—';
  }

  function clientRow(c){
    const p = c.profile || {};
    const ava = p.photo ? '<img src="'+p.photo+'" alt="">' : initial(c.name);
    return '<a class="client-link" href="admin-client.html?email='+encodeURIComponent(c.email)+'">'+
        '<div class="ava">'+ava+'</div>'+
        '<div class="who"><b>'+esc(c.name)+'</b><span>'+esc(c.email)+'</span></div>'+
        '<span class="chev">›</span>'+
      '</a>';
  }

  let CLIENTS = [];
  function renderClients(){
    const q = (document.getElementById('search').value||'').toLowerCase();
    const filtered = CLIENTS.filter(c =>
      (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q));
    const el = document.getElementById('clientList');
    if (!filtered.length){ el.innerHTML = '<p class="empty">No clients found.</p>'; return; }
    const shown = filtered.slice(0, 10);
    el.innerHTML = shown.map(c=>clientRow(c)).join('') +
      (filtered.length > 10 ? '<p class="clients-more">Showing 10 of '+filtered.length+' — search to narrow results.</p>' : '');
  }

  function chatKeyFor(email){ return 'magnum_chat_' + (email||'').toLowerCase(); }
  function getChat(email){ try{return JSON.parse(localStorage.getItem(chatKeyFor(email))||'[]');}catch(e){return [];} }
  function getChatThreads(){
    const emails = [];
    for (let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if (k && k.indexOf('magnum_chat_')===0) emails.push(k.slice('magnum_chat_'.length));
    }
    return emails;
  }
  function nameFor(email){
    const c = CLIENTS.find(c => (c.email||'').toLowerCase() === (email||'').toLowerCase());
    return c ? c.name : email;
  }

  let activeEmail = null;

  function renderMessages(){
    const threads = getChatThreads();
    const list = document.getElementById('convList');
    if(!threads.length){
      list.innerHTML = '<p class="empty" style="padding:18px;">No client messages yet.</p>';
      document.getElementById('convView').innerHTML =
        '<div class="cv-empty">No conversations yet. When a client sends a message from the portal, it will appear here.</div>';
      return;
    }
    // newest-active conversations first
    threads.sort((a,b)=>{
      const la = getChat(a).slice(-1)[0], lb = getChat(b).slice(-1)[0];
      return (lb?lb.date:'').localeCompare(la?la.date:'');
    });
    list.innerHTML = threads.map(email=>{
      const msgs = getChat(email);
      const last = msgs[msgs.length-1];
      const preview = last ? (last.from==='admin'?'You: ':'') + last.text : 'No messages yet';
      return '<div class="conv-item'+(email===activeEmail?' active':'')+'" onclick="openConv(\''+esc(email)+'\')">'+
        '<div class="ava">'+initial(nameFor(email))+'</div>'+
        '<div class="ci"><b>'+esc(nameFor(email))+'</b><span>'+esc(preview)+'</span></div>'+
        '<span class="badge">'+msgs.length+'</span>'+
      '</div>';
    }).join('');

    // keep current selection if still present, else default to first
    if(!activeEmail || threads.indexOf(activeEmail)===-1){ activeEmail = threads[0]; }
    renderConvView();
  }

  function openConv(email){ activeEmail = email; renderMessages(); }

  function renderConvView(){
    const view = document.getElementById('convView');
    if(!activeEmail){ view.innerHTML = '<div class="cv-empty">Select a conversation to read and reply.</div>'; return; }
    const msgs = getChat(activeEmail);
    const bubbles = msgs.length
      ? msgs.map(m => '<div class="bubble '+(m.from==='admin'?'me':'them')+'">'+esc(m.text)+'<span class="bt">'+esc(m.date)+'</span></div>').join('')
      : '<div class="cv-empty">No messages in this conversation yet.</div>';
    view.innerHTML =
      '<div class="cv-head"><div class="ava">'+initial(nameFor(activeEmail))+'</div>'+
        '<div><b>'+esc(nameFor(activeEmail))+'</b><span>'+esc(activeEmail)+'</span></div></div>'+
      '<div class="cv-thread" id="cvThread">'+bubbles+'</div>'+
      '<div class="cv-reply">'+
        '<input type="text" id="cvReply" placeholder="Type your reply..." autocomplete="off" '+
          'onkeydown="if(event.key===\'Enter\'){event.preventDefault();sendReply();}">'+
        '<button onclick="sendReply()" aria-label="Send">➤</button>'+
      '</div>';
    const t = document.getElementById('cvThread');
    if(t){ t.scrollTop = t.scrollHeight; }
  }

  function notifyClient(email, text){
    const k = 'magnum_notify_' + (email||'').toLowerCase();
    let a; try{ a = JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ a=[]; }
    a.push({ id:'n'+Date.now().toString(36), text:text, date:new Date().toLocaleString(), read:false });
    localStorage.setItem(k, JSON.stringify(a));
  }
  function sendReply(){
    if(!activeEmail) return;
    const inp = document.getElementById('cvReply');
    const text = (inp.value||'').trim();
    if(!text) return;
    const msgs = getChat(activeEmail);
    msgs.push({ from:'admin', text:text, date:new Date().toLocaleString() });
    localStorage.setItem(chatKeyFor(activeEmail), JSON.stringify(msgs));
    notifyClient(activeEmail, 'You have a new reply from our team.');
    renderMessages();
  }

  function setFeedback(a){ localStorage.setItem('magnum_feedback', JSON.stringify(a)); }
  function renderFeedback(){
    const fb = getFeedback();
    const el = document.getElementById('fbList');
    if(!fb.length){ el.innerHTML = '<p class="empty">No feedback yet.</p>'; return; }
    el.innerHTML = fb.slice().reverse().map(f=>{
      const ava = f.photo ? '<img src="'+f.photo+'" alt="">' : initial(f.name);
      const idA = "'" + (f.id||'') + "'";
      const action = f.approved
        ? '<button class="btn" style="background:#e2e7ec;color:#243a52;" onclick="featureFb('+idA+',false)">★ Remove from About Us</button>'
        : '<button class="btn green" onclick="featureFb('+idA+',true)">★ Feature on About Us</button>';
      return '<div class="fb-item"><div class="fb-top"><div class="fb-ava">'+ava+'</div>'+
        '<div><div class="fb-name">'+esc(f.name)+'</div><div class="fb-date">'+esc(f.date)+(f.approved?' · ✓ Featured':'')+'</div></div>'+
        '<div class="fb-stars">'+starString(f.rating)+'</div></div>'+
        '<div class="fb-text">'+esc(f.text)+'</div>'+
        '<div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">'+action+
        '<button class="btn" style="background:transparent;border:1px solid #c0392b;color:#c0392b;" onclick="deleteFb('+idA+')">Delete</button></div>'+
      '</div>';
    }).join('');
  }
  function featureFb(id, on){
    if (on && !confirm('Feature this review on the public About Us page?')) return;
    const fb = getFeedback().map(f => { if((f.id||'')===id) f.approved = on; return f; });
    setFeedback(fb); renderFeedback();
    if (on){
      const r = fb.find(f => (f.id||'')===id);
      if (r && r.email) notifyClient(r.email, 'Your review is now featured on our About Us page. Thank you!');
    }
  }
  function deleteFb(id){
    if (!confirm('Delete this review?')) return;
    setFeedback(getFeedback().filter(f => (f.id||'')!==id));
    renderFeedback();
  }

  // ----- Excel export (Sign Ups + Client Info) -----
  function cell(v){ return '<Cell><Data ss:Type="String">'+esc(v)+'</Data></Cell>'; }
  function sheet(name, headers, rows){
    let h='<Worksheet ss:Name="'+esc(name)+'"><Table><Row>'+headers.map(cell).join('')+'</Row>';
    rows.forEach(r=>{ h+='<Row>'+r.map(cell).join('')+'</Row>'; });
    return h+'</Table></Worksheet>';
  }
  function exportExcel(){
    const signups = getSignups();
    const signSheet = sheet('Sign Ups', ['Full Name','Email','Password','Sign-up Date'],
      signups.map(r=>[r.name,r.email,r.password,r.date]));
    const infoSheet = sheet('Client Info',
      ['Full Name','Email','Phone','Sex','Date of Birth','Occupation','Address','About Me','Files Uploaded'],
      CLIENTS.map(c=>[c.name,c.email,c.profile.phone,c.profile.sex,c.profile.dob,c.profile.job,c.profile.addr,c.profile.bio,c.docs.length]));
    const xml='<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n'+
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">'+
      signSheet+infoSheet+'</Workbook>';
    const blob=new Blob([xml],{type:'application/vnd.ms-excel'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='magnum-signups.xls'; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  // ----- notifications (admin) -----
  function getANotif(){ try{return JSON.parse(localStorage.getItem('magnum_admin_notify')||'[]');}catch(e){return [];} }
  function renderNotif(){
    const a = getANotif();
    const unread = a.filter(n => !n.read).length;
    document.getElementById('notifDot').style.display = unread ? 'block' : 'none';
    const el = document.getElementById('notifList');
    el.innerHTML = a.length ? a.slice().reverse().map(n => {
      const link = n.email ? ' <a href="admin-client.html?email='+encodeURIComponent(n.email)+'">View client →</a>' : '';
      const feat = n.type === 'feedback' ? ' <a href="#" onclick="document.getElementById(\'notifPanel\').classList.remove(\'open\');document.querySelector(\'#fbList\').scrollIntoView({behavior:\'smooth\'});return false;">Review feedback →</a>' : '';
      return '<div class="ni'+(n.read?'':' unread')+'">'+esc(n.text)+feat+link+'<span class="nd">'+esc(n.date)+'</span></div>';
    }).join('') : '<div class="notif-empty">No notifications.</div>';
  }
  function toggleNotif(){
    const p = document.getElementById('notifPanel');
    if (p.classList.toggle('open')){
      const a = getANotif().map(n => (n.read=true, n));
      localStorage.setItem('magnum_admin_notify', JSON.stringify(a));
      renderNotif();
    }
  }
  document.addEventListener('click', function(e){
    const w = document.querySelector('.notif-wrap');
    if (w && !w.contains(e.target)) document.getElementById('notifPanel').classList.remove('open');
  });

  // live-update when a client changes something in another tab
  window.addEventListener('storage', function(e){
    if (!e.key) return;
    if (e.key === 'magnum_admin_notify') renderNotif();
    if (e.key === 'magnum_feedback') renderFeedback();
    if (e.key.indexOf('magnum_chat_') === 0) renderMessages();
  });

  // init
  CLIENTS = getClients();
  renderStats(CLIENTS);
  renderClients();
  renderMessages();
  renderFeedback();
  renderNotif();
</script>
</body>
</html>
