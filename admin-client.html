<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client — Magnum CPA PC Admin</title>
<style>
  :root{--navy:#243a52;--navy-dark:#1c2e41;--navy-3:#13212f;--gold:#f4a93c;--green:#7fae3a;--blue:#2f9fd6;
    --text:#2b2b2b;--muted:#5e6b78;--border:#e1e6ec;--bg-alt:#f3f5f8;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:var(--bg-alt);line-height:1.6;}
  a{text-decoration:none;color:inherit;}
  .container{max-width:1000px;margin:0 auto;padding:0 20px;}
  header{background:var(--navy-3);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.3);}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;gap:14px;}
  .hbar img{height:38px;}
  .hbar .r{display:flex;gap:12px;align-items:center;}
  .btn{background:var(--gold);color:var(--navy-dark);font-weight:700;border:0;border-radius:6px;padding:9px 16px;cursor:pointer;font-size:.85rem;}
  .btn.ghost{background:transparent;color:#cdd6df;border:1px solid #3a4d66;}
  .btn.green{background:var(--green);color:#fff;}
  .who{padding:26px 0 6px;}
  .who h1{color:#fff;font-size:1.5rem;}
  .who span{color:#bccadb;font-size:.9rem;}
  .who .bk{color:var(--gold);font-size:.85rem;font-weight:700;}

  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.15);margin-top:16px;}
  .tabs button{background:transparent;border:0;color:#bccadb;font-weight:700;font-size:.88rem;padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent;}
  .tabs button.active{color:#fff;border-bottom-color:var(--gold);}
  section.pane{display:none;padding:26px 0 50px;}
  section.pane.active{display:block;}

  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 8px 22px rgba(36,58,82,.06);}
  .card h3{color:var(--navy);font-size:1.05rem;margin-bottom:14px;}
  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 24px;}
  .it label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;}
  .it span{color:#2b2b2b;font-size:.95rem;}
  .empty{color:var(--muted);font-style:italic;}
  .doc-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
  .doc-row .m{flex:1;min-width:0;}.doc-row .m b{display:block;color:var(--navy);font-size:.92rem;}
  .doc-row .m span{font-size:.76rem;color:var(--muted);}.doc-row a{color:var(--blue);font-weight:700;font-size:.82rem;}

  /* organizer accordion */
  .osec{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .osec-head{width:100%;text-align:left;background:#f4f6f8;border:0;cursor:pointer;padding:13px 16px;font-weight:700;color:var(--navy);display:flex;justify-content:space-between;}
  .osec.open .osec-head .chev{transform:rotate(90deg);} .osec-head .chev{transition:.2s;color:var(--muted);}
  .osec-body{display:none;padding:16px;border-top:1px solid var(--border);} .osec.open .osec-body{display:block;}
  .ofield{margin-bottom:12px;} .ofield label{display:block;font-size:.82rem;font-weight:600;color:var(--navy);margin-bottom:5px;}
  .ofield input,.ofield select,.ofield textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.93rem;font-family:inherit;}
  .ofield .ostatic{padding:9px 12px;background:#f4f6f8;border-radius:8px;color:var(--muted);font-size:.93rem;}
  .ofield .ofile{font-size:.8rem;color:var(--green);font-weight:600;}
  .saved{color:var(--green);font-weight:700;font-size:.85rem;opacity:0;transition:.3s;} .saved.show{opacity:1;}

  /* updates / meetings */
  .field{margin-bottom:12px;} .field label{display:block;font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:5px;}
  .field input,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;}
  .feed-item{border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:8px;padding:14px 16px;margin-bottom:10px;background:#fff;}
  .feed-item .d{font-size:.75rem;color:var(--muted);margin-bottom:4px;}
  .feed-item .t{color:#2b2b2b;}
  .feed-item .a{margin-top:6px;} .feed-item .a a{color:var(--blue);font-weight:700;font-size:.83rem;}
  .feed-item .del{float:right;color:#c0392b;background:0;border:0;cursor:pointer;font-size:.8rem;font-weight:700;}
  .asana-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  @media(max-width:680px){.info-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="container hbar">
    <a href="admin.html"><img src="images/MAGNUM%20CPA%20LOGO.png" alt="Magnum CPA PC"></a>
    <div class="r">
      <a href="admin.html" class="btn ghost">← All Clients</a>
      <button class="btn ghost" onclick="Magnum.signOut().then(function(){location.href='admin-login.html';});">Log Out</button>
    </div>
  </div>
</header>

<div style="background:var(--navy);">
  <div class="container">
    <div class="who">
      <a class="bk" href="admin.html">Clients ›</a>
      <h1 id="cName">Client</h1>
      <span id="cEmail"></span>
    </div>
    <div class="tabs">
      <button class="active" data-p="details" onclick="showPane('details')">Details</button>
      <button data-p="documents" onclick="showPane('documents')">Documents</button>
      <button data-p="organizer" onclick="showPane('organizer')">Organizer</button>
      <button data-p="updates" onclick="showPane('updates')">Account Updates</button>
      <button data-p="meetings" onclick="showPane('meetings')">Meeting Notes</button>
    </div>
  </div>
</div>

<div class="container">
  <section class="pane active" id="pane-details">
    <div class="card"><h3>Client Details</h3><div class="info-grid" id="detailsGrid"></div></div>
  </section>

  <section class="pane" id="pane-documents">
    <div class="card"><h3>Uploaded Documents</h3><div id="docList"></div></div>
  </section>

  <section class="pane" id="pane-organizer">
    <div class="card">
      <h3 id="orgTitle">Tax Organizer</h3>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:14px;">Edit or add any details on the client's organizer. Saving notifies the client.</p>
      <form id="orgForm" onsubmit="return saveOrg(event)">
        <div id="orgSections"></div>
        <div style="margin-top:18px;display:flex;align-items:center;gap:14px;">
          <button class="btn" type="submit">Save Organizer</button><span class="saved" id="orgSaved">✓ Saved &amp; client notified</span>
        </div>
      </form>
    </div>
  </section>

  <section class="pane" id="pane-updates">
    <div class="card">
      <h3>Post an Account Update</h3>
      <div class="asana-bar">
        <input class="field" style="flex:1;margin:0;" type="url" id="asanaUrl" placeholder="Linked Asana project URL (optional)">
        <button class="btn green" type="button" onclick="saveAsana()">Save Asana Link</button>
        <a class="btn" id="asanaOpen" target="_blank" rel="noopener" style="display:none;">Open Asana ↗</a>
      </div>
      <form onsubmit="return addUpdate(event)">
        <div class="field"><label>Update</label><textarea id="updText" rows="3" placeholder="e.g. Return drafted and under review; awaiting your 1099-INT." required></textarea></div>
        <div class="field"><label>Asana task link (optional)</label><input type="url" id="updTask" placeholder="https://app.asana.com/..."></div>
        <button class="btn" type="submit">Post Update &amp; Notify Client</button>
      </form>
      <h3 style="margin-top:22px;">Posted Updates</h3>
      <div id="updList"></div>
    </div>
  </section>

  <section class="pane" id="pane-meetings">
    <div class="card">
      <h3>Add Meeting Notes</h3>
      <form onsubmit="return addMeeting(event)">
        <div class="field"><label>Meeting Title / Date</label><input type="text" id="mtTitle" placeholder="e.g. Year-end planning call — Jun 23, 2026" required></div>
        <div class="field"><label>What was discussed</label><textarea id="mtNotes" rows="5" required></textarea></div>
        <div class="field"><label>Google Drive link (optional)</label><input type="url" id="mtDrive" placeholder="https://drive.google.com/drive/folders/..."></div>
        <button class="btn" type="submit">Save Notes &amp; Notify Client</button>
      </form>
      <h3 style="margin-top:22px;">Meeting History</h3>
      <div id="mtList"></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="organizer.js"></script>
<script>
  const clientId = new URLSearchParams(location.search).get('id') || '';
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  let profile = {};
  let orgData = {};
  let cname = 'Client';

  async function notifyClient(text){ await Magnum.addNotification(clientId, 'client', text, 'update'); }

  function showPane(p){
    document.querySelectorAll('.pane').forEach(s=>s.classList.remove('active'));
    document.getElementById('pane-'+p).classList.add('active');
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  }

  function renderDetails(){
    const p=profile;
    const rows=[['Email',p.email],['Phone',p.phone],['Sex',p.sex],['Date of Birth',p.dob],['Occupation',p.job],['Address',p.addr],['Sign-up Date',p.created_at?new Date(p.created_at).toLocaleString():''],['About',p.bio]];
    document.getElementById('detailsGrid').innerHTML = rows.map(r=>'<div class="it"><label>'+r[0]+'</label><span>'+(r[1]?esc(r[1]):'—')+'</span></div>').join('');
  }

  // documents — files the client attached in the organizer (Supabase Storage)
  async function renderDocs(){
    const files=[];
    ORGANIZER_SECTIONS.forEach(function(sec){ sec.fields.forEach(function(f){
      const v=orgData[f.id];
      if(f.type==='file' && v && v.name && v.path) files.push({name:v.name,path:v.path,category:f.label});
    });});
    const el=document.getElementById('docList');
    if(!files.length){ el.innerHTML='<p class="empty">No documents uploaded.</p>'; return; }
    const rows=await Promise.all(files.map(async function(d){
      const url=await Magnum.fileUrl(d.path);
      return '<div class="doc-row"><div class="m"><b>'+esc(d.name)+'</b><span>'+esc(d.category||'')+'</span></div><a href="'+url+'" target="_blank" rel="noopener">Download</a></div>';
    }));
    el.innerHTML=rows.join('');
  }

  // ----- organizer (editable) -----
  function renderOrg(){
    document.getElementById('orgTitle').textContent = ORGANIZER_TITLE + ' — ' + cname;
    const defaults = organizerDefaults(profile, profile.email||'');
    document.getElementById('orgSections').innerHTML = ORGANIZER_SECTIONS.map(function(sec){
      const fields=sec.fields.map(function(f){
        let v=orgData[f.id];
        if((v===undefined||v==='') && defaults[f.id]!==undefined) v=defaults[f.id];
        if(f.type==='select') return '<div class="ofield"><label>'+esc(f.label)+'</label><select id="o_'+f.id+'">'+f.options.map(o=>'<option'+(v===o?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select></div>';
        if(f.type==='display') return '<div class="ofield"><label>'+esc(f.label)+'</label><div class="ostatic">'+esc(f.value)+'</div></div>';
        if(f.type==='yesno') return '<div class="ofield"><label>'+esc(f.label)+'</label><select id="o_'+f.id+'">'+['','Yes','No'].map(o=>'<option'+(v===o?' selected':'')+'>'+o+'</option>').join('')+'</select></div>';
        if(f.type==='textarea') return '<div class="ofield"><label>'+esc(f.label)+'</label><textarea id="o_'+f.id+'" rows="2">'+esc(v||'')+'</textarea></div>';
        if(f.type==='file'){ const cur=(v&&v.name)?'<span class="ofile">📎 '+esc(v.name)+'</span>':'<span class="ofile" style="color:var(--muted)">No file</span>'; return '<div class="ofield"><label>'+esc(f.label)+'</label>'+cur+'</div>'; }
        const t=(f.type==='date'?'date':(f.type==='number'?'number':'text'));
        return '<div class="ofield"><label>'+esc(f.label)+'</label><input type="'+t+'" id="o_'+f.id+'" value="'+esc(v||'')+'"></div>';
      }).join('');
      return '<div class="osec"><button type="button" class="osec-head" onclick="this.parentNode.classList.toggle(\'open\')"><span>'+esc(sec.title)+'</span><span class="chev">▸</span></button><div class="osec-body">'+fields+'</div></div>';
    }).join('');
  }
  async function saveOrg(e){
    e.preventDefault();
    ORGANIZER_SECTIONS.forEach(sec=>sec.fields.forEach(function(f){
      if(f.type==='display'||f.type==='file') return;
      const el=document.getElementById('o_'+f.id); if(el) orgData[f.id]=el.value;
    }));
    const { error } = await Magnum.saveOrganizer(clientId, orgData);
    if (error){ alert('Could not save: '+error.message); return false; }
    await notifyClient('Our team updated your tax organizer.');
    const n=document.getElementById('orgSaved'); n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),2000);
    return false;
  }

  // ----- account updates -----
  function renderAsana(){
    const url=profile.asana_url||'';
    document.getElementById('asanaUrl').value=url;
    const open=document.getElementById('asanaOpen');
    if(url){ open.href=url; open.style.display='inline-block'; } else { open.style.display='none'; }
  }
  async function saveAsana(){
    const url=document.getElementById('asanaUrl').value.trim();
    await Magnum.saveProfile(clientId, { asana_url: url });
    profile.asana_url = url; renderAsana();
  }
  async function renderUpdates(){
    const a=await Magnum.getUpdates(clientId);
    const el=document.getElementById('updList');
    el.innerHTML = a.length ? a.slice().reverse().map(u=>'<div class="feed-item"><button class="del" onclick="delUpdate(\''+u.id+'\')">Delete</button><div class="d">'+esc(u.created_at?new Date(u.created_at).toLocaleString():'')+'</div><div class="t">'+esc(u.text)+'</div>'+(u.task?'<div class="a"><a href="'+esc(u.task)+'" target="_blank" rel="noopener">Open Asana task ↗</a></div>':'')+'</div>').join('') : '<p class="empty">No updates posted yet.</p>';
  }
  async function addUpdate(e){
    e.preventDefault();
    const text=document.getElementById('updText').value.trim();
    await Magnum.addUpdate(clientId, text, document.getElementById('updTask').value.trim());
    await notifyClient('New account update: '+text.slice(0,60));
    e.target.reset(); renderUpdates(); return false;
  }
  async function delUpdate(id){ await Magnum.deleteUpdate(id); renderUpdates(); }

  // ----- meeting notes -----
  async function renderMeetings(){
    const a=await Magnum.getMeetings(clientId);
    const el=document.getElementById('mtList');
    el.innerHTML = a.length ? a.slice().reverse().map(m=>'<div class="feed-item"><button class="del" onclick="delMeeting(\''+m.id+'\')">Delete</button><div class="d">'+esc(m.created_at?new Date(m.created_at).toLocaleString():'')+'</div><b style="color:var(--navy)">'+esc(m.title)+'</b><div class="t" style="white-space:pre-wrap;margin-top:4px;">'+esc(m.notes)+'</div>'+(m.drive?'<div class="a"><a href="'+esc(m.drive)+'" target="_blank" rel="noopener">📁 Open Google Drive folder ↗</a></div>':'')+'</div>').join('') : '<p class="empty">No meeting notes yet.</p>';
  }
  async function addMeeting(e){
    e.preventDefault();
    const title=document.getElementById('mtTitle').value.trim();
    await Magnum.addMeeting(clientId, title, document.getElementById('mtNotes').value.trim(), document.getElementById('mtDrive').value.trim());
    await notifyClient('New meeting notes added: '+title.slice(0,60));
    e.target.reset(); renderMeetings(); return false;
  }
  async function delMeeting(id){ await Magnum.deleteMeeting(id); renderMeetings(); }

  // ----- init -----
  (async function init(){
    await Magnum.requireAdmin();
    if (!clientId){ alert('No client specified.'); location.href='admin.html'; return; }
    profile = await Magnum.getProfile(clientId);
    orgData = await Magnum.getOrganizer(clientId);
    cname = profile.name || profile.email || 'Client';
    document.getElementById('cName').textContent = cname;
    document.getElementById('cEmail').textContent = profile.email || '';
    document.title = cname + ' — Magnum CPA Admin';
    renderDetails();
    renderDocs();
    renderOrg();
    renderAsana();
    renderUpdates();
    renderMeetings();
  })();
</script>
</body>
</html>
