<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Magnum CPA PC</title>
<meta name="description" content="Secure Client Portal for Magnum CPA PC. Log in or sign up with Google, Apple, or your email address.">
<style>
  :root{
    --navy:#243a52;
    --navy-dark:#1c2e41;
    --navy-3:#13212f;
    --gold:#f4a93c;
    --green:#7fae3a;
    --blue:#2f9fd6;
    --text:#2b2b2b;
    --muted:#6b7785;
    --border:#dfe4ea;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;flex-direction:column;
    background:linear-gradient(135deg,var(--navy-3) 0%,var(--navy) 60%,#2c4866 100%);
  }
  a{text-decoration:none;color:inherit;}
  .globe{width:46px;height:46px;display:block;flex:none;}

  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:34px 18px;}
  .card{
    width:100%;max-width:430px;background:#fff;border-radius:16px;
    box-shadow:0 24px 60px rgba(0,0,0,.4);overflow:hidden;
  }

  /* header */
  .card-head{background:var(--navy);color:#fff;padding:28px 30px 24px;text-align:center;}
  .brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:14px;}
  .brand .t b{font-size:1.2rem;color:var(--green);font-weight:700;}
  .brand .t b span{color:#fff;}
  .brand .t small{display:block;font-size:.62rem;letter-spacing:1px;color:#aebccb;text-align:left;}
  .card-head h1{font-size:1.35rem;margin-bottom:4px;}
  .card-head p{color:#bccadb;font-size:.9rem;}

  /* tabs */
  .tabs{display:flex;border-bottom:1px solid var(--border);}
  .tabs button{
    flex:1;background:#f5f7f9;border:0;padding:15px;font-size:.95rem;font-weight:700;
    color:var(--muted);cursor:pointer;letter-spacing:.3px;transition:.2s;
  }
  .tabs button.active{background:#fff;color:var(--navy);box-shadow:inset 0 -3px 0 var(--gold);}

  .body{padding:28px 30px 30px;}
  .pane-title{font-size:.92rem;color:var(--muted);text-align:center;margin-bottom:18px;}

  /* social buttons */
  .sso{display:flex;flex-direction:column;gap:11px;margin-bottom:20px;}
  .sso button{
    display:flex;align-items:center;justify-content:center;gap:11px;width:100%;
    padding:12px 16px;border:1px solid var(--border);border-radius:8px;background:#fff;
    font-size:.95rem;font-weight:600;color:#2b2b2b;cursor:pointer;transition:.18s;
  }
  .sso button:hover{background:#f7f9fb;border-color:#c9d2db;transform:translateY(-1px);}
  .sso button svg{width:20px;height:20px;flex:none;}
  .sso button.apple{background:#000;color:#fff;border-color:#000;}
  .sso button.apple:hover{background:#1a1a1a;}

  /* divider */
  .divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.8rem;margin:6px 0 18px;}
  .divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--border);}

  /* form */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.8rem;font-weight:700;color:var(--navy);margin-bottom:6px;}
  .field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:1rem;}
  .field input:focus{outline:2px solid var(--gold);border-color:transparent;}
  .signup-only{display:none;}
  body.mode-signup .signup-only{display:block;}

  .btn-primary{
    width:100%;background:var(--gold);color:var(--navy-dark);font-weight:800;
    padding:13px;border:0;border-radius:8px;font-size:1rem;cursor:pointer;letter-spacing:.3px;
    transition:transform .15s,box-shadow .2s;margin-top:4px;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(244,169,60,.4);}

  .helper{text-align:center;font-size:.85rem;color:var(--muted);margin-top:16px;}
  .helper a{color:var(--blue);font-weight:600;}
  .fineprint{text-align:center;font-size:.72rem;color:#9aa6b2;margin-top:14px;line-height:1.5;}

  .back{display:block;text-align:center;color:#cdd6df;font-size:.85rem;padding:0 0 26px;}
  .back:hover{color:#fff;}
  .secure{display:flex;align-items:center;justify-content:center;gap:6px;color:#8fd0a0;font-size:.78rem;margin-top:10px;}
</style>
</head>
<body class="mode-login">

<!-- globe icon -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="globeIcon" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="gOcean" cx="40%" cy="34%" r="80%">
        <stop offset="0%" stop-color="#dcf0fb"/><stop offset="58%" stop-color="#a9d6f2"/><stop offset="100%" stop-color="#6db4e0"/>
      </radialGradient>
      <clipPath id="gClip"><circle cx="50" cy="50" r="47"/></clipPath>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#gOcean)"/>
    <g clip-path="url(#gClip)" fill="none" stroke="#ffffff" stroke-width="0.8" opacity=".35">
      <line x1="3" y1="32" x2="97" y2="32"/><line x1="3" y1="50" x2="97" y2="50"/>
      <line x1="3" y1="68" x2="97" y2="68"/><line x1="50" y1="3" x2="50" y2="97"/>
      <ellipse cx="50" cy="50" rx="20" ry="47"/><ellipse cx="50" cy="50" rx="37" ry="47"/>
    </g>
    <g clip-path="url(#gClip)">
      <path d="M28 18 C34 16 44 17 52 20 C60 22 70 24 74 30 C76 34 72 38 70 42 C72 46 70 52 64 56 C62 60 60 60 58 64 C57 68 55 66 54 62 C52 60 50 60 47 64 C44 70 42 78 38 82 C36 84 34 82 35 76 C36 70 34 64 32 58 C30 52 26 48 24 42 C22 36 22 28 25 22 C26 20 27 19 28 18 Z" fill="#5b9a3a" stroke="#467a2c" stroke-width="1"/>
      <path d="M32 58 C30 52 26 48 24 42 C22 36 22 28 25 22" fill="none" stroke="#f4a93c" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24.5" cy="43" r="3.6" fill="#e8442b" stroke="#fff" stroke-width="1.3"/>
    </g>
    <circle cx="50" cy="50" r="47" fill="none" stroke="#2f6d96" stroke-width="2"/>
  </symbol>
</svg>

<div class="wrap">
  <div>
    <div class="card">
      <div class="card-head">
        <div class="brand">
          <img src="images/MAGNUM%20CPA%20LOGO.png" alt="Magnum CPA PC" style="height:40px;width:auto;display:block;margin:0 auto;">
        </div>
        <h1 id="headTitle">Client Portal</h1>
        <p id="headSub">Securely access your documents, returns, and messages.</p>
      </div>

      <!-- Log In / Sign Up tabs -->
      <div class="tabs">
        <button id="tabLogin" class="active" onclick="setMode('login')">Log In</button>
        <button id="tabSignup" onclick="setMode('signup')">Sign Up</button>
      </div>

      <div class="body">
        <p class="pane-title" id="paneTitle">Enter your details to continue</p>

        <!-- Email form -->
        <form onsubmit="return emailContinue(event)">
          <div class="field signup-only">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Jane Doe">
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="pw">Password</label>
            <input type="password" id="pw" placeholder="••••••••" required>
          </div>
          <div class="field signup-only">
            <label for="pw2">Confirm Password</label>
            <input type="password" id="pw2" placeholder="••••••••">
          </div>
          <button type="submit" class="btn-primary" id="submitBtn">Log In</button>
        </form>

        <p class="helper" id="switchHelper">
          New client? <a href="#" onclick="setMode('signup');return false;">Create an account</a>
        </p>
        <div class="secure">🔒 Secured client portal</div>
        <p class="fineprint">By continuing you agree to Magnum CPA PC's Terms of Service and Privacy Policy.</p>
      </div>
    </div>
    <a class="back" href="index.html">← Back to magnumcpa.com</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  // If already signed in, go straight to the dashboard.
  Magnum.currentUser().then(function(u){ if (u) location.href = 'dashboard.html'; });

  function setMode(mode){
    const signup = mode === 'signup';
    document.body.classList.toggle('mode-signup', signup);
    document.body.classList.toggle('mode-login', !signup);
    tabLogin.classList.toggle('active', !signup);
    tabSignup.classList.toggle('active', signup);
    headTitle.textContent = signup ? 'Create Your Account' : 'Client Portal';
    headSub.textContent = signup
      ? 'Set up secure access to your tax documents and messages.'
      : 'Securely access your documents, returns, and messages.';
    paneTitle.textContent = signup ? 'Sign up in seconds' : 'Enter your details to continue';
    submitBtn.textContent = signup ? 'Create Account' : 'Log In';
    switchHelper.innerHTML = signup
      ? 'Already a client? <a href="#" onclick="setMode(\'login\');return false;">Log in</a>'
      : 'New client? <a href="#" onclick="setMode(\'signup\');return false;">Create an account</a>';
  }

  async function emailContinue(e){
    e.preventDefault();
    const signup = document.body.classList.contains('mode-signup');
    const btn = document.getElementById('submitBtn');
    const em = email.value.trim();
    const pass = pw.value;
    btn.disabled = true;

    try {
      if (signup){
        if (pass !== pw2.value){ alert('Passwords do not match. Please re-enter.'); return false; }
        if (pass.length < 6){ alert('Please choose a password of at least 6 characters.'); return false; }
        const { data, error } = await Magnum.signUp(fullname.value.trim(), em, pass);
        if (error){ alert(error.message); return false; }
        // If email confirmation is OFF, a session exists now → go to dashboard.
        if (data.session){
          window.location.href = 'dashboard.html';
        } else {
          alert('Account created! Please check your email to confirm your address, then log in.');
          e.target.reset();
          setMode('login');
        }
        return false;
      }

      // Log in
      const { error } = await Magnum.signIn(em, pass);
      if (error){
        alert('Incorrect email or password. If you have not signed up yet, please use the Sign Up tab.');
        return false;
      }
      window.location.href = 'dashboard.html';
      return false;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
